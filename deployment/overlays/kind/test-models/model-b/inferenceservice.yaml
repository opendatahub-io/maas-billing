apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: model-b
  namespace: llm
  labels:
    tier: premium
    model: qwen3-0.6b
  annotations:
    serving.kserve.io/deploymentMode: "Serverless"
spec:
  model:
    name: "model-b"
    uri: "hf://Qwen/Qwen2.5-0.5B-Instruct"
  template:
    containers:
    - name: kserve-container
      image: ghcr.io/vllm-project/semantic-router/llm-katan:latest
      ports:
      - containerPort: 8000
        protocol: TCP
      command: ["llm-katan"]
      args:
      - "--model"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--served-model-name"
      - "model-b"
      - "--no-quantize"
      env:
      - name: HUGGINGFACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: huggingface-token
            key: token
            optional: true
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"

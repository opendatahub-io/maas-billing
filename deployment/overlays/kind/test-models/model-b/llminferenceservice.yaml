apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: model-b
  namespace: llm
  labels:
    tier: premium
    model: qwen3-0.6b
  annotations: {}
spec:
  model:
    name: "model-b"
    uri: "hf://facebook/opt-125m"
  template:
    containers:
    - name: kserve-container
      image: ghcr.io/llm-d/llm-d-inference-sim:v0.5.1
      imagePullPolicy: Always
      ports:
      - containerPort: 8000
        protocol: TCP
      command: ["/app/llm-d-inference-sim"]
      args:
      - "--port"
      - "8000"
      - "--model"
      - "model-b"
      - "--mode"
      - "random"
      env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: metadata.name
      - name: POD_NAMESPACE
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: metadata.namespace
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
